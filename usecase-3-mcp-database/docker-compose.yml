services:
  postgres:
    image: postgres:16-alpine
    container_name: foodfacts-db
    environment:
      POSTGRES_DB: foodfacts
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workshop -d foodfacts"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
